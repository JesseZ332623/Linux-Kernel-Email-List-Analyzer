# RabbitMQ 属性配置

spring:
  rabbitmq:
    host: localhost
    port: 5672
    username: jesse
    password: 1234567890
    virtual-host: /
    requested-heartbeat: 10s
    listener:
      simple:
        acknowledge-mode: manual # 手动确认模式
        concurrency: 50      # 并发消费者数量
        max-concurrency: 75  # 最大并发消费者数量
        prefetch: 1          # 每个消费者一次只取 1 条消息

app:
  rabbitmq-queue-props:
    lkml:
      # 内核邮件交换机名
      exchange-name: lkml.exchange
      # 内核邮件消息队列名
      queue-name: lkml.queue
      # 内核邮件消息路由键（交换机靠本路由键精确投递消息）
      routing-key: lkml.key

      # 公用的死信交换机名
      dlx-exchange-name: dlx.exchange
      # 内核邮件死信消息队列名
      dlx-queue-name: lkml.dlx.queue
      # 内核邮件死信路由键
      dlx-routing-key: lkml.dlx.key

  # 每次往消息队列推送的内核补丁邮件数量（-1 表示全量推送）
  lkml-push-limit: 1000

