<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邮件分析结果</title>
    <style>
        /* GitHub 暗色主题 */
        :root {
          --bg-primary: #0d1117;
          --bg-secondary: #161b22;
          --bg-tertiary: #21262d;
          --border-color: #30363d;
          --text-primary: #c9d1d9;
          --text-secondary: #8b949e;
          --text-link: #58a6ff;
          --text-highlight: #f0f6fc;
          --accent-color: #1f6feb;
          --danger-color: #f85149;
          --success-color: #3fb950;
          --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
          --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        }

        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        body {
          background-color: var(--bg-primary);
          color: var(--text-primary);
          font-family: var(--font-sans);
          line-height: 1.6;
          padding: 2rem;
          max-width: 960px;
          margin: 0 auto;
        }

        .card {
          background-color: var(--bg-secondary);
          border: 1px solid var(--border-color);
          border-radius: 6px;
          padding: 1.5rem;
          margin-bottom: 1.5rem;
        }

        .card-title {
          font-size: 1.25rem;
          font-weight: 600;
          color: var(--text-highlight);
          border-bottom: 1px solid var(--border-color);
          padding-bottom: 0.75rem;
          margin-bottom: 1rem;
          display: flex;
          align-items: center;
          gap: 0.5rem;
        }

        .email-subject {
          font-size: 1.1rem;
          font-weight: 600;
          color: var(--text-link);
          margin-bottom: 0.75rem;
          word-break: break-word;
        }

        .email-meta {
          font-size: 0.85rem;
          color: var(--text-secondary);
          display: flex;
          gap: 2rem;
          flex-wrap: wrap;
          margin-bottom: 1rem;
        }

        .email-meta .from {
          color: var(--text-secondary);
        }

        .email-meta .time {
          color: var(--text-secondary);
        }

        .email-body {
          background-color: var(--bg-tertiary);
          border: 1px solid var(--border-color);
          border-radius: 6px;
          padding: 1rem;
          font-family: var(--font-mono);
          font-size: 0.9rem;
          white-space: pre-wrap;
          word-break: break-word;
          color: var(--text-primary);
          max-height: 400px;
          overflow-y: auto;
        }

        .ai-section {
          display: flex;
          flex-direction: column;
          gap: 1rem;
        }

        .ai-meta {
          display: grid;
          grid-template-columns: auto 1fr;
          gap: 0.5rem 1.5rem;
          font-size: 0.9rem;
        }

        .ai-meta dt {
          color: var(--text-secondary);
          font-weight: 500;
          min-width: 120px;
        }

        .ai-meta dd {
          color: var(--text-primary);
          font-family: var(--font-mono);
          font-size: 0.85rem;
          word-break: break-all;
        }

        .ai-content {
          background-color: var(--bg-tertiary);
          border: 1px solid var(--border-color);
          border-radius: 6px;
          padding: 1rem;
          font-family: var(--font-mono);
          font-size: 0.9rem;
          white-space: pre-wrap;
          word-break: break-word;
          color: var(--text-primary);
          max-height: 500px;
          overflow-y: auto;
        }

        .token-stats {
          display: flex;
          gap: 1.5rem;
          background-color: var(--bg-tertiary);
          border-radius: 6px;
          padding: 0.75rem 1rem;
          margin-top: 0.5rem;
        }

        .token-item {
          display: flex;
          flex-direction: column;
          align-items: center;
        }

        .token-label {
          font-size: 0.75rem;
          color: var(--text-secondary);
          text-transform: uppercase;
          letter-spacing: 0.5px;
        }

        .token-value {
          font-size: 1.1rem;
          font-weight: 600;
          color: var(--text-highlight);
          font-family: var(--font-mono);
        }

        .fingerprint {
          margin-top: 1rem;
          font-size: 0.8rem;
          color: var(--text-secondary);
          font-family: var(--font-mono);
          background-color: var(--bg-tertiary);
          padding: 0.5rem 1rem;
          border-radius: 6px;
          word-break: break-all;
        }

        .fingerprint span {
          color: var(--text-secondary);
          margin-right: 0.5rem;
        }

        hr {
          border: none;
          border-top: 1px solid var(--border-color);
          margin: 1.5rem 0;
        }
    </style>
</head>
<body>

                 alt="linux"
                 style="width: 25px; height: 25px; vertical-align: middle;" />
            内核邮件详情
        </div>
        <!-- messageId 作为标题显示，但更醒目的是 subject -->
        <div class="email-subject" th:text="*{kernelEmail.subject}">邮件标题</div>
        <div class="email-meta">
            <div class="from">
                <span style="color: var(--text-secondary);">发件人：</span>
                <span th:text="*{kernelEmail.from}">unknown</span>
            </div>
            <div class="time">
                <span style="color: var(--text-secondary);">时间 (LKML)：</span>
                <span th:text="*{kernelEmail.kernalTime}">unknown</span>
            </div>
        </div>
        <div class="email-body" th:text="*{kernelEmail.textContent}">邮件正文...</div>
        <!-- 可选的 messageId 显示，如果仍需，可以放在底部 -->
        <div style="margin-top: 0.75rem; font-size: 0.8rem; color: var(--text-secondary);">
            Message-ID: <span th:text="*{kernelEmail.messageId}" style="font-family: monospace;"></span>
        </div>
    </div>

    <!-- AI 响应卡片 -->

        <div class="card-title">

            <dl class="ai-meta">
                <dt>响应 ID</dt>
                <dd th:text="*{aiModelAnswerResponse.id}">-</dd>
                <dt>模型名称</dt>
                <dd th:text="*{aiModelAnswerResponse.model}">-</dd>
            </dl>
            <div>
                <div style="color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 0.5rem;">分析内容</div>
                <div class="ai-content" th:utext="*{aiModelAnswerResponse.choices[0].message.content}">
                    AI 回复内容...
                </div>
            </div>
            <!-- Token 用量统计 -->
            <div class="token-stats">
                <div class="token-item">
                    <span class="token-label">Prompt Tokens</span>
                    <span class="token-value" th:text="*{aiModelAnswerResponse.usage.promptTokens}">0</span>
                </div>
                <div class="token-item">
                    <span class="token-label">Completion Tokens</span>
                    <span class="token-value" th:text="*{aiModelAnswerResponse.usage.completionTokens}">0</span>
                </div>
                <div class="token-item">
                    <span class="token-label">Total Tokens</span>
                    <span class="token-value" th:text="*{aiModelAnswerResponse.usage.totalTokens}">0</span>
                </div>
            </div>
            <!-- 系统指纹 -->
            <div class="fingerprint">
                <span>System Fingerprint:</span>
                <span th:text="*{aiModelAnswerResponse.systemFingerPrint}">-</span>
            </div>
        </div>
    </div>
</div>
</body>
</html>
